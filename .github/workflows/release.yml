name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Build with Maven
        run: mvn clean package

      - name: Create Windows Installer
        run: |
          jpackage `
            --input target `
            --main-jar protocaller-api-client-1.0.0-SNAPSHOT.jar `
            --main-class com.overzealouspelican.Main `
            --name ProtoCaller `
            --type exe `
            --app-version 1.0.0 `
            --vendor "OverzealousPelican Development" `
            --description "Privacy-focused desktop API client" `
            --java-options '-Xmx512m' `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut

          Write-Host "=== Files in current directory after jpackage ==="
          Get-ChildItem
          Write-Host "=== Looking for EXE files ==="
          Get-ChildItem -Filter "*.exe" -ErrorAction SilentlyContinue
          if (-not (Test-Path "ProtoCaller-*.exe")) {
            Write-Host "ERROR: No EXE file was created!"
            exit 1
          }

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "*.exe"
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Build with Maven
        run: mvn clean package

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode the certificate from base64
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          # Import the certificate
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Verify the identity is available
          security find-identity -v -p codesigning build.keychain

          # Clean up the certificate file
          rm certificate.p12

      - name: Create entitlements file
        run: |
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.allow-dyld-environment-variables</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Create macOS app bundle
        run: |
          jpackage \
            --input target \
            --main-jar protocaller-api-client-1.0.0-SNAPSHOT.jar \
            --main-class com.overzealouspelican.Main \
            --name ProtoCaller \
            --type app-image \
            --app-version 1.0.0 \
            --vendor "OverzealousPelican Development" \
            --description "Privacy-focused desktop API client" \
            --java-options '-Xmx512m' \
            --mac-package-name ProtoCaller

      - name: Sign the app bundle
        env:
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
        run: |
          # Sign all nested binaries and dylibs first, then the app bundle
          find ProtoCaller.app -type f \( -name "*.dylib" -o -name "*.jnilib" \) -exec \
            codesign --force --sign "$DEVELOPER_ID" --options runtime \
            --entitlements entitlements.plist --timestamp {} \;

          # Sign all executables inside the runtime
          find ProtoCaller.app/Contents/runtime -type f -perm +111 -exec \
            codesign --force --sign "$DEVELOPER_ID" --options runtime \
            --entitlements entitlements.plist --timestamp {} \;

          # Sign the main app bundle
          codesign --force --deep --sign "$DEVELOPER_ID" --options runtime \
            --entitlements entitlements.plist --timestamp ProtoCaller.app

          # Verify
          codesign --verify --verbose=2 ProtoCaller.app
          spctl --assess --type execute --verbose=2 ProtoCaller.app || true

      - name: Create DMG
        run: |
          jpackage \
            --app-image ProtoCaller.app \
            --type dmg \
            --app-version 1.0.0 \
            --name ProtoCaller \
            --vendor "OverzealousPelican Development" \
            --description "Privacy-focused desktop API client" \
            --mac-package-name ProtoCaller

          echo "=== Looking for DMG files ==="
          ls -la *.dmg

      - name: Sign the DMG
        env:
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
        run: |
          codesign --force --sign "$DEVELOPER_ID" --timestamp ProtoCaller-1.0.0.dmg
          codesign --verify --verbose=2 ProtoCaller-1.0.0.dmg

      - name: Notarize the DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit ProtoCaller-1.0.0.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          # Staple the notarization ticket to the DMG
          xcrun stapler staple ProtoCaller-1.0.0.dmg

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: "*.dmg"
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Build with Maven
        run: mvn clean package

      - name: Create Linux DEB Installer (with jlink workaround)
        run: |
          # Create a custom runtime by copying the full JDK to avoid ct.sym jlink bug in JDK 25
          cp -r $JAVA_HOME custom-runtime

          # Use jpackage with the custom runtime to bypass jlink
          jpackage \
            --input target \
            --main-jar protocaller-api-client-1.0.0-SNAPSHOT.jar \
            --main-class com.overzealouspelican.Main \
            --name ProtoCaller \
            --type deb \
            --app-version 1.0 \
            --vendor "OverzealousPelican Development" \
            --description "Privacy-focused desktop API client" \
            --java-options '-Xmx512m' \
            --runtime-image custom-runtime \
            --linux-package-name protocaller \
            --linux-app-category utils \
            --linux-shortcut

          # List all files to see what was created
          echo "=== Files in current directory after jpackage ==="
          ls -la
          echo "=== Looking for DEB files ==="
          ls -la *.deb 2>/dev/null || echo "No .deb files found with ls *.deb"
          find . -name "*.deb" -type f || echo "No .deb files found with find"

      - name: Upload Linux Installer
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: "*.deb"
          if-no-files-found: error

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts structure ==="
          find . -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-installer/*.exe
            macos-installer/*.dmg
            linux-installer/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
