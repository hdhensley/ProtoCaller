name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Build with Maven
        run: mvn clean package

      - name: Create Windows Installer
        run: |
          jpackage `
            --input target `
            --main-jar protocaller-api-client-1.0.0-SNAPSHOT.jar `
            --main-class com.overzealouspelican.Main `
            --name ProtoCaller `
            --type exe `
            --app-version ${{ steps.version.outputs.VERSION }} `
            --vendor "OverzealousPelican Development" `
            --description "Privacy-focused desktop API client" `
            --java-options '-Xmx512m' `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut

          Write-Host "=== Files in current directory after jpackage ==="
          Get-ChildItem
          Write-Host "=== Looking for EXE files ==="
          Get-ChildItem -Filter "*.exe" -ErrorAction SilentlyContinue
          if (-not (Test-Path "ProtoCaller-*.exe")) {
            Write-Host "ERROR: No EXE file was created!"
            exit 1
          }

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "*.exe"
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Build with Maven
        run: mvn clean package

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          security find-identity -v -p codesigning build.keychain
          rm certificate.p12

      - name: Create entitlements file
        run: |
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.allow-dyld-environment-variables</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Create macOS app bundle
        run: |
          jpackage \
            --input target \
            --main-jar protocaller-api-client-1.0.0-SNAPSHOT.jar \
            --main-class com.overzealouspelican.Main \
            --name ProtoCaller \
            --type app-image \
            --app-version ${{ steps.version.outputs.VERSION }} \
            --vendor "OverzealousPelican Development" \
            --description "Privacy-focused desktop API client" \
            --java-options '-Xmx512m' \
            --mac-package-name ProtoCaller

      - name: Sign the app bundle (inside-out)
        env:
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
        run: |
          APP="ProtoCaller.app"

          # Find and re-sign every Mach-O binary in the bundle (dylibs, executables, etc.)
          # This catches everything including JDK runtime binaries that ship without timestamps
          echo "=== Finding all Mach-O binaries ==="
          find "$APP" -type f | while read -r file; do
            if file "$file" | grep -q "Mach-O"; then
              echo "Signing: $file"
              codesign --force --sign "$DEVELOPER_ID" --options runtime \
                --entitlements entitlements.plist --timestamp "$file"
            fi
          done

          echo "=== Signing all .jar files ==="
          find "$APP" -name "*.jar" -exec \
            codesign --force --sign "$DEVELOPER_ID" --timestamp {} \;

          echo "=== Signing the main executable ==="
          codesign --force --sign "$DEVELOPER_ID" --options runtime \
            --entitlements entitlements.plist --timestamp \
            "$APP/Contents/MacOS/ProtoCaller"

          echo "=== Signing the top-level app bundle ==="
          codesign --force --sign "$DEVELOPER_ID" --options runtime \
            --entitlements entitlements.plist --timestamp "$APP"

          echo "=== Verifying signature ==="
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "=== Checking Gatekeeper assessment ==="
          spctl --assess --type execute --verbose=2 "$APP" || true

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          jpackage \
            --app-image ProtoCaller.app \
            --type dmg \
            --app-version "$VERSION" \
            --name ProtoCaller \
            --vendor "OverzealousPelican Development" \
            --description "Privacy-focused desktop API client" \
            --mac-package-name ProtoCaller

          echo "=== Looking for DMG files ==="
          ls -la *.dmg

      - name: Sign the DMG
        env:
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG_FILE="ProtoCaller-${VERSION}.dmg"
          codesign --force --sign "$DEVELOPER_ID" --timestamp "$DMG_FILE"
          codesign --verify --verbose=2 "$DMG_FILE"

      - name: Notarize the DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG_FILE="ProtoCaller-${VERSION}.dmg"

          # Submit and capture the output to get the submission ID
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG_FILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait 2>&1) || true

          echo "$SUBMIT_OUTPUT"

          # Extract submission ID
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep -m1 "id:" | awk '{print $2}')

          # Check if notarization succeeded
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
            echo "Notarization succeeded!"
          else
            echo "Notarization failed. Fetching detailed log..."
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_PASSWORD" \
                notarization-log.json
              echo "=== Notarization Log ==="
              cat notarization-log.json
            fi
            exit 1
          fi

          # Staple the notarization ticket
          xcrun stapler staple "$DMG_FILE"

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: "*.dmg"
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Build with Maven
        run: mvn clean package

      - name: Create Linux DEB Installer (with jlink workaround)
        run: |
          cp -r $JAVA_HOME custom-runtime

          jpackage \
            --input target \
            --main-jar protocaller-api-client-1.0.0-SNAPSHOT.jar \
            --main-class com.overzealouspelican.Main \
            --name ProtoCaller \
            --type deb \
            --app-version ${{ steps.version.outputs.VERSION }} \
            --vendor "OverzealousPelican Development" \
            --description "Privacy-focused desktop API client" \
            --java-options '-Xmx512m' \
            --runtime-image custom-runtime \
            --linux-package-name protocaller \
            --linux-app-category utils \
            --linux-shortcut

          echo "=== Looking for DEB files ==="
          ls -la *.deb 2>/dev/null || echo "No .deb files found"
          find . -name "*.deb" -type f || echo "No .deb files found with find"

      - name: Upload Linux Installer
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: "*.deb"
          if-no-files-found: error

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts structure ==="
          find . -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-installer/*.exe
            macos-installer/*.dmg
            linux-installer/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
